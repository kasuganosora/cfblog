<!-- Default Theme - Home Page Template -->
<!-- Semantic HTML5 structure with accessibility -->

<aside class="sidebar">
  <!-- Featured Posts Section -->
  <section class="sidebar-section" aria-labelledby="featured-heading">
    <h2 id="featured-heading" class="sidebar-title">
      <span class="icon">⭐</span>
      精选文章
    </h2>
    <div id="featured-posts" class="featured-posts">
      <!-- Featured posts will be loaded here -->
      <div class="loading">加载中...</div>
    </div>
  </section>

  <!-- Popular Tags Section -->
  <section class="sidebar-section" aria-labelledby="tags-heading">
    <h2 id="tags-heading" class="sidebar-title">
      <span class="icon">🏷️</span>
      热门标签
    </h2>
    <div id="popular-tags" class="popular-tags">
      <!-- Popular tags will be loaded here -->
      <div class="loading">加载中...</div>
    </div>
  </section>

  <!-- Categories Section -->
  <section class="sidebar-section" aria-labelledby="categories-heading">
    <h2 id="categories-heading" class="sidebar-title">
      <span class="icon">📂</span>
      分类
    </h2>
    <nav id="categories-nav" class="categories-nav" aria-label="分类导航">
      <!-- Categories will be loaded here -->
      <div class="loading">加载中...</div>
    </nav>
  </section>
</aside>
