{{> admin/base}}

<div class="categories-management">
    <div class="page-actions">
        <a href="#" id="add-category" class="btn btn-primary">
            <i class="fas fa-plus"></i> 添加分类
        </a>
    </div>
    
    <div class="categories-table-container">
        {{#hasCategories}}
        <table class="categories-table">
            <thead>
                <tr>
                    <th>分类名称</th>
                    <th>描述</th>
                    <th>文章数量</th>
                    <th>创建时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                {{#categories}}
                <tr>
                    <td class="category-name">
                        {{name}}
                    </td>
                    <td class="category-description">
                        {{description}}
                    </td>
                    <td>{{postsCount}}</td>
                    <td>{{formattedCreatedAt}}</td>
                    <td class="category-actions">
                        <button class="action-btn edit-btn" data-id="{{id}}" data-name="{{name}}" data-description="{{description}}" title="编辑">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="action-btn delete-btn" data-id="{{id}}" data-name="{{name}}" title="删除">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
                {{/categories}}
            </tbody>
        </table>
        {{/hasCategories}}
        {{^hasCategories}}
        <div class="no-categories">
            <p>还没有创建任何分类。</p>
        </div>
        {{/hasCategories}}
    </div>
</div>

<!-- 添加/编辑分类对话框 -->
<div id="category-form" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="category-form-title">添加分类</h3>
            <button class="modal-close">&times;</button>
        </div>
        <div class="modal-body">
            <form id="category-form-element" action="/api/category" method="POST">
                <input type="hidden" name="id" id="category-id">
                
                <div class="form-group">
                    <label for="category-name">分类名称 <span class="required">*</span></label>
                    <input type="text" id="category-name" name="name" required>
                </div>
                
                <div class="form-group">
                    <label for="category-description">描述</label>
                    <textarea id="category-description" name="description" rows="3"></textarea>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button type="button" id="save-category" class="btn btn-primary">保存</button>
            <button class="modal-close btn btn-secondary">取消</button>
        </div>
    </div>
</div>

<!-- 删除确认对话框 -->
<div id="delete-confirm" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>确认删除</h3>
            <button class="modal-close">&times;</button>
        </div>
        <div class="modal-body">
            <p>确定要删除分类 "<span id="delete-title"></span>" 吗？</p>
            <p>此操作不可撤销，但该分类下的文章不会被删除。</p>
        </div>
        <div class="modal-footer">
            <button id="confirm-delete" class="btn btn-danger">删除</button>
            <button class="modal-close btn btn-secondary">取消</button>
        </div>
    </div>
</div>
