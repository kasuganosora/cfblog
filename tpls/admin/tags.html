{{> admin/base}}

<div class="tags-management">
    <div class="page-actions">
        <a href="#" id="add-tag" class="btn btn-primary">
            <i class="fas fa-plus"></i> 添加标签
        </a>
    </div>
    
    <div class="tags-table-container">
        {{#hasTags}}
        <table class="tags-table">
            <thead>
                <tr>
                    <th>标签名称</th>
                    <th>文章数量</th>
                    <th>创建时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                {{#tags}}
                <tr>
                    <td class="tag-name">
                        {{name}}
                    </td>
                    <td>{{postsCount}}</td>
                    <td>{{formattedCreatedAt}}</td>
                    <td class="tag-actions">
                        <button class="action-btn delete-btn" data-id="{{id}}" data-name="{{name}}" title="删除">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
                {{/tags}}
            </tbody>
        </table>
        {{/hasTags}}
        {{^hasTags}}
        <div class="no-tags">
            <p>还没有创建任何标签。</p>
        </div>
        {{/hasTags}}
    </div>
</div>

<!-- 添加标签对话框 -->
<div id="tag-form" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>添加标签</h3>
            <button class="modal-close">&times;</button>
        </div>
        <div class="modal-body">
            <form id="tag-form-element" action="/api/tag" method="POST">
                <div class="form-group">
                    <label for="tag-name">标签名称 <span class="required">*</span></label>
                    <input type="text" id="tag-name" name="name" required>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button type="button" id="save-tag" class="btn btn-primary">保存</button>
            <button class="modal-close btn btn-secondary">取消</button>
        </div>
    </div>
</div>

<!-- 删除确认对话框 -->
<div id="delete-confirm" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>确认删除</h3>
            <button class="modal-close">&times;</button>
        </div>
        <div class="modal-body">
            <p>确定要删除标签 "<span id="delete-title"></span>" 吗？</p>
            <p>此操作不可撤销，但该标签将从相关文章中移除。</p>
        </div>
        <div class="modal-footer">
            <button id="confirm-delete" class="btn btn-danger">删除</button>
            <button class="modal-close btn btn-secondary">取消</button>
        </div>
    </div>
</div>
