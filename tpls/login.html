<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - {{blogTitle}}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-form">
            <header class="login-header">
                <h1>登录</h1>
                <p>{{blogTitle}}</p>
            </header>
            
            {{#error}}
            <div class="error-message">
                {{error}}
            </div>
            {{/error}}
            
            <form id="loginForm" class="login-form-element">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <input type="hidden" id="encryptedData" name="encryptedData">
                <input type="hidden" id="timestamp" name="timestamp">
                <input type="hidden" id="salt" name="salt">
                
                <div class="form-actions">
                    <button type="submit" class="btn">登录</button>
                    <a href="/" class="btn btn-secondary">返回首页</a>
                </div>
            </form>
            
            <script>
                // 生成随机盐值
                function generateSalt(length = 16) {
                    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
                    let result = '';
                    for (let i = 0; i < length; i++) {
                        result += chars.charAt(Math.floor(Math.random() * chars.length));
                    }
                    return result;
                }
                
                // SHA256哈希函数
                async function sha256(message) {
                    const encoder = new TextEncoder();
                    const data = encoder.encode(message);
                    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
                    const hashArray = Array.from(new Uint8Array(hashBuffer));
                    const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
                    return hashHex;
                }
                
                // 处理登录表单提交
                document.getElementById('loginForm').addEventListener('submit', async function(e) {
                    e.preventDefault();
                    
                    const username = document.getElementById('username').value;
                    const password = document.getElementById('password').value;
                    
                    if (!username || !password) {
                        alert('用户名和密码不能为空');
                        return;
                    }
                    
                    // 生成盐值和时间戳
                    const salt = generateSalt();
                    const timestamp = Date.now().toString();
                    
                    // 第一步加密：用户名+密码+盐值+时间戳
                    const firstHash = await sha256(username + password + salt + timestamp);
                    
                    // 第二步加密：拼接盐值和时间戳后再次加密
                    const finalHash = await sha256(firstHash + salt + timestamp);
                    
                    // 设置隐藏字段
                    document.getElementById('encryptedData').value = finalHash;
                    document.getElementById('timestamp').value = timestamp;
                    document.getElementById('salt').value = salt;
                    
                    // 提交表单数据
                    const formData = new FormData();
                    formData.append('encryptedData', finalHash);
                    formData.append('timestamp', timestamp);
                    formData.append('salt', salt);
                    formData.append('username', username);
                    
                    const submitBtn = this.querySelector('button[type="submit"]');
                    const originalHTML = submitBtn.innerHTML;
                    
                    submitBtn.disabled = true;
                    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 登录中...';
                    
                    try {
                        const response = await fetch('/api/user/login', {
                            method: 'POST',
                            body: formData
                        });
                        
                        const data = await response.json();
                        
                        if (data.success) {
                            // 存储sessionID到localStorage
                            if (data.sessionID) {
                                localStorage.setItem('sessionID', data.sessionID);
                                // 设置过期时间（7天）
                                const expirationTime = Date.now() + 7 * 24 * 60 * 60 * 1000;
                                localStorage.setItem('sessionExpiration', expirationTime.toString());
                            }
                            
                            // 显示成功消息
                            alert('登录成功！');
                            
                            // 重定向到管理后台
                            setTimeout(() => {
                                window.location.href = '/admin';
                            }, 1000);
                        } else {
                            alert(data.message || '登录失败，请检查用户名和密码');
                            submitBtn.disabled = false;
                            submitBtn.innerHTML = originalHTML;
                        }
                    } catch (error) {
                        console.error('Error:', error);
                        alert('发生错误，请稍后再试');
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = originalHTML;
                    }
                });
            </script>
        </div>
    </div>
    
    <footer>
        <p>&copy; {{currentYear}} {{blogTitle}}. 使用 Cloudflare Workers 驱动</p>
    </footer>
</body>
</html>
