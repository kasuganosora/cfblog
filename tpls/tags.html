{{> base}}

<div class="page-header">
    <h1>文章标签</h1>
    <p>按标签浏览所有文章</p>
</div>

<div class="tags-container">
    {{#hasTags}}
        <div class="tags-cloud">
            {{#tags}}
            <a href="/tag/{{slug}}" class="tag-cloud-item" data-count="{{postsCount}}">
                #{{name}} ({{postsCount}})
            </a>
            {{/tags}}
        </div>
    {{/hasTags}}
    {{^hasTags}}
        <div class="no-tags">
            <p>还没有创建任何标签。</p>
        </div>
    {{/hasTags}}
</div>
